name: Aadhiyandham CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Quality Control Scripts
      run: |
        # 1. Enforce strict hierarchical numbering on module headers
        python3 scripts/renumber_headers.py

        # 2. Clean and deduplicate vocabulary sections
        python3 scripts/clean_vocabulary.py

        # 3. Inject glossary back-references into modules
        python3 scripts/add_glossaries.py

        # 4. Regenerate Content Plan to ensure it matches MD files
        python3 scripts/generate_content_plan.py

        # 5. Regenerate HTML mirrors from markdown sources
        python3 scripts/generate_new_htmls.py

        # 6. Inject Navigation Bar globally into HTML
        python3 scripts/inject_nav.py

        # 7. Validate internal markdown cross-references
        python3 scripts/check_markdown_links.py

        # 8. Advisory: Check glossary coverage (does not fail build)
        python3 scripts/check_glossary_coverage.py || true

        # 9. Validate internal HTML links
        python3 scripts/check_html_links.py

    - name: Check for Uncommitted Changes
      run: |
        # If the scripts above generated new HTML or MD changes that were not pushed, fail the build.
        # This ensures the author always runs the build pipeline locally before pushing.
        if [[ `git status --porcelain` ]]; then
          echo "Error: The build pipeline generated changes that are not committed."
          echo "Please run the pipeline scripts locally and commit the resulting changes."
          git status
          git diff
          exit 1
        fi
